name: Deploy website to GitHub Pages

on:
  # Trigger the workflow every time y>
  push:
    branches: ['main']
  # Allows you to run this workflow m>
  workflow_dispatch:

# Provide permission to clone the rep>
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Check deployment configuration
  config:
    if: github.repository_owner != 'H>
    runs-on: ubuntu-latest
    outputs:
      deploy-host: ${{ steps.check.ou>
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
	sparse-checkout: hugoblox.yaml   sparse-checkout-cone-mode: fa>

    - name: Check deploy host
      id: check
      run: |
        # Install pinned yq version f>
        YQ_VERSION="v4.44.1"
        if ! wget -q --tries=3 --wait>
          "https://github.com/mikefar>
          echo "::error::Failed to do>
          exit 1
        fi
        sudo mv /tmp/yq /usr/local/bi>
        sudo chmod +x /usr/local/bin/>

        # Read deploy.host from hugob>
        HOST=$(yq '.deploy.host // "">
        HOST=${HOST:-github-pages}

        # Validate known hosts
        if [[ ! "$HOST" =~ ^(github-p>
          echo "::warning::Unknown de>
          HOST="github-pages"
        fi

       	echo "host=$HOST" >> $GITHUB_>
        echo "Deployment target: $HOS>

  # Build website using reusable work>
  build:  needs: config
    if: github.repository_owner != 'H>
    uses: ./.github/workflows/build.y>
    secrets: inherit

  # Deploy website to GitHub Pages ho>
  deploy:
    needs: [config, build]
    if: needs.config.outputs.deploy-h>
    # Grant GITHUB_TOKEN the permissi>
    permissions:
      pages: write # to deploy to Pag>
      id-token: write # to verify the>
    # Deploy to the github-pages envi>
    environment:
      name: github-pages
      url: ${{ steps.deployment.outpu>
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
